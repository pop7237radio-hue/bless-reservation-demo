<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f4ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Bless予約メモ" />
  <title>美容室Bless 予約メモ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --surface: #fffefa;
      --ink: #232521;
      --muted: #68736d;
      --line: #ddd5c8;
      --primary: #2c6b63;
      --primary-dark: #1f4e48;
      --accent: #a95145;
      --soft: #eef4f1;
      --warn: #fff2df;
      --shadow: 0 16px 34px rgba(43, 38, 30, .12);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
    }

    * { box-sizing: border-box; }
    html { font-size: 20px; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      font-size: 1rem;
      line-height: 1.65;
    }
    button, input, select, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; cursor: pointer; }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 244, 238, .94);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(221, 213, 200, .85);
      padding: 14px 16px 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .today-chip {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--primary-dark);
      font-size: .9rem;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(43, 38, 30, .07);
    }

    .stats {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-height: 70px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 10px;
    }

    .stat b {
      display: block;
      font-size: 1.35rem;
      line-height: 1.1;
      color: var(--primary-dark);
    }

    .stat span {
      display: block;
      margin-top: 4px;
      font-size: .8rem;
      color: var(--muted);
    }

    main {
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .95fr);
      gap: 14px;
      align-items: start;
      flex: 1;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fffefa, #faf7f0);
    }

    h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .sub {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: .8rem;
      font-weight: 500;
    }

    .calendar-tools {
      display: flex;
      gap: 8px;
    }

    .icon-btn,
    .primary-btn,
    .ghost-btn,
    .danger-btn {
      min-height: 52px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-size: .95rem;
      font-weight: 900;
    }

    .icon-btn {
      width: 52px;
      display: grid;
      place-items: center;
      font-size: 1.35rem;
    }

    .primary-btn {
      width: 100%;
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .ghost-btn {
      padding: 0 12px;
      color: var(--primary-dark);
    }

    .danger-btn {
      padding: 0 10px;
      color: var(--accent);
      border-color: rgba(169, 81, 69, .34);
      background: #fff8f6;
    }

    .calendar {
      padding: 12px;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .weekdays {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: .85rem;
      font-weight: 800;
      text-align: center;
    }

    .day {
      position: relative;
      min-height: 84px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 7px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 5px;
    }

    .day[disabled] {
      opacity: .42;
      cursor: not-allowed;
      background: #f2eee6;
    }

    .day.selected {
      outline: 3px solid rgba(44, 107, 99, .2);
      border-color: var(--primary);
      background: var(--soft);
    }

    .day.today .num {
      background: var(--primary);
      color: #fff;
    }

    .num {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: .95rem;
    }

    .badge {
      align-self: flex-start;
      min-width: 28px;
      border-radius: 999px;
      background: var(--warn);
      color: #7b4a10;
      padding: 4px 8px;
      font-size: .8rem;
      font-weight: 900;
      text-align: center;
    }

    .side {
      display: grid;
      gap: 14px;
    }

    .selected-date {
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .selected-date strong {
      font-size: 1.35rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .list {
      padding: 12px;
      display: grid;
      gap: 9px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
      background: #fffaf2;
    }

    .appointment {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      background: #fff;
    }

    .time {
      border-radius: 8px;
      background: var(--soft);
      color: var(--primary-dark);
      min-height: 64px;
      display: grid;
      place-items: center;
      font-size: 1.15rem;
      font-weight: 900;
    }

    .who {
      min-width: 0;
    }

    .who b,
    .who span {
      display: block;
      overflow-wrap: anywhere;
    }

    .who b {
      font-size: 1rem;
      line-height: 1.35;
    }

    .who span {
      margin-top: 3px;
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.35;
    }

    form {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: .9rem;
      font-weight: 900;
      color: var(--primary-dark);
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 14px 12px;
      font-size: 1rem;
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(44, 107, 99, .14);
    }

    .time-pickers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .time-pickers select {
      height: 170px;
      padding: 10px;
    }

    .time-pickers option {
      padding: 10px 12px;
      border-radius: 6px;
    }

    .hint {
      margin: -3px 0 0;
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.55;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 20;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      max-width: min(92vw, 420px);
      border-radius: 8px;
      background: #1f2a24;
      color: #fff;
      padding: 12px 14px;
      font-size: .95rem;
      font-weight: 800;
      box-shadow: 0 18px 36px rgba(0, 0, 0, .22);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 840px) {
      main {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      h1 { font-size: 1.28rem; }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .day {
        min-height: 70px;
        padding: 5px;
      }

      .num {
        width: 30px;
        height: 30px;
        font-size: .85rem;
      }

      .badge {
        min-width: 24px;
        padding: 2px 6px;
      }

      .appointment {
        grid-template-columns: 78px minmax(0, 1fr);
      }

      .appointment .danger-btn {
        grid-column: 1 / -1;
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      header { padding-inline: 12px; }
      .today-chip { font-size: .8rem; padding: 8px 9px; }
      .stat b { font-size: 1.15rem; }
      .section-head { padding-inline: 12px; }
      .calendar { padding: 8px; }
      .weekdays, .days { gap: 4px; }
      .day { min-height: 64px; border-radius: 7px; }
      .time-pickers { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <h1>美容室Bless　予約メモ</h1>
        <div class="today-chip" id="todayChip"></div>
      </div>
      <div class="stats" aria-label="予約状況">
        <div class="stat"><b id="todayCount">0</b><span>今日</span></div>
        <div class="stat"><b id="selectedCount">0</b><span>選択日</span></div>
        <div class="stat"><b id="monthCount">0</b><span>3ヶ月内</span></div>
      </div>
    </header>

    <main>
      <section aria-labelledby="calendarTitle">
        <div class="section-head">
          <div>
            <h2 id="calendarTitle">カレンダー</h2>
            <span class="sub">今日から3ヶ月先まで登録できます</span>
          </div>
          <div class="calendar-tools">
            <button class="icon-btn" type="button" id="prevMonth" aria-label="前の月">‹</button>
            <button class="icon-btn" type="button" id="nextMonth" aria-label="次の月">›</button>
          </div>
        </div>
        <div class="calendar">
          <div class="weekdays" aria-hidden="true">
            <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
          </div>
          <div class="days" id="calendarDays"></div>
        </div>
      </section>

      <div class="side">
        <section aria-labelledby="listTitle">
          <div class="selected-date">
            <div>
              <h2 id="listTitle">1日の予約</h2>
              <strong id="selectedDateLabel"></strong>
            </div>
            <button class="ghost-btn" type="button" id="jumpToday">今日</button>
          </div>
          <div class="list" id="appointmentList"></div>
        </section>

        <section aria-labelledby="formTitle">
          <div class="section-head">
            <div>
              <h2 id="formTitle">予約を追加</h2>
              <span class="sub">9:00開始、17:00最終受付</span>
            </div>
          </div>
          <form id="reservationForm">
            <div class="time-pickers">
              <label>
                時
                <select id="hourSelect" size="5" aria-label="時"></select>
              </label>
              <label>
                分
                <select id="minuteSelect" size="5" aria-label="分"></select>
              </label>
            </div>
            <p class="hint">時と分は上下にスクロールして選べます。分は5分刻みです。</p>

            <label>
              お名前
              <input id="customerName" autocomplete="name" placeholder="例：山田さん" required />
            </label>

            <label>
              メニュー
              <select id="serviceSelect">
                <option>カット</option>
                <option>カラー</option>
                <option>パーマ</option>
                <option>カット＋カラー</option>
                <option>その他</option>
              </select>
            </label>

            <label>
              メモ
              <textarea id="memoInput" placeholder="電話予約、LINE予約、注意点など"></textarea>
            </label>

            <button class="primary-btn" type="submit">追加する</button>
          </form>
        </section>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "beautyReservationDemo.v1";
    const today = stripTime(new Date());
    const maxDate = addMonths(today, 3);
    const state = {
      selectedDate: toKey(today),
      visibleMonth: new Date(today.getFullYear(), today.getMonth(), 1),
      reservations: loadReservations()
    };

    const els = {
      todayChip: document.querySelector("#todayChip"),
      todayCount: document.querySelector("#todayCount"),
      selectedCount: document.querySelector("#selectedCount"),
      monthCount: document.querySelector("#monthCount"),
      calendarTitle: document.querySelector("#calendarTitle"),
      calendarDays: document.querySelector("#calendarDays"),
      selectedDateLabel: document.querySelector("#selectedDateLabel"),
      appointmentList: document.querySelector("#appointmentList"),
      prevMonth: document.querySelector("#prevMonth"),
      nextMonth: document.querySelector("#nextMonth"),
      jumpToday: document.querySelector("#jumpToday"),
      form: document.querySelector("#reservationForm"),
      hour: document.querySelector("#hourSelect"),
      minute: document.querySelector("#minuteSelect"),
      name: document.querySelector("#customerName"),
      service: document.querySelector("#serviceSelect"),
      memo: document.querySelector("#memoInput"),
      toast: document.querySelector("#toast")
    };

    initPickers();
    bindEvents();
    render();

    function bindEvents() {
      els.prevMonth.addEventListener("click", () => {
        state.visibleMonth = new Date(state.visibleMonth.getFullYear(), state.visibleMonth.getMonth() - 1, 1);
        render();
      });

      els.nextMonth.addEventListener("click", () => {
        state.visibleMonth = new Date(state.visibleMonth.getFullYear(), state.visibleMonth.getMonth() + 1, 1);
        render();
      });

      els.jumpToday.addEventListener("click", () => {
        state.selectedDate = toKey(today);
        state.visibleMonth = new Date(today.getFullYear(), today.getMonth(), 1);
        render();
      });

      els.form.addEventListener("submit", (event) => {
        event.preventDefault();
        const time = `${els.hour.value}:${els.minute.value}`;
        const name = els.name.value.trim();
        const service = els.service.value;
        const memo = els.memo.value.trim();
        if (!name) {
          showToast("お名前を入力してください");
          els.name.focus();
          return;
        }

        const duplicate = getDayReservations(state.selectedDate).some((item) => item.time === time);
        if (duplicate && !window.confirm(`${time} に予約があります。追加しますか？`)) return;

        state.reservations.push({
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          date: state.selectedDate,
          time,
          name,
          service,
          memo,
          createdAt: new Date().toISOString()
        });
        saveReservations();
        els.form.reset();
        els.hour.value = "09";
        els.minute.value = "00";
        render();
        showToast("予約を追加しました");
      });
    }

    function initPickers() {
      for (let hour = 9; hour <= 17; hour += 1) {
        const option = document.createElement("option");
        option.value = String(hour).padStart(2, "0");
        option.textContent = `${hour}時`;
        els.hour.appendChild(option);
      }
      for (let minute = 0; minute < 60; minute += 5) {
        const option = document.createElement("option");
        option.value = String(minute).padStart(2, "0");
        option.textContent = `${String(minute).padStart(2, "0")}分`;
        els.minute.appendChild(option);
      }
      els.hour.value = "09";
      els.minute.value = "00";
    }

    function render() {
      els.todayChip.textContent = formatShort(today);
      renderCalendar();
      renderList();
      renderStats();
    }

    function renderCalendar() {
      const year = state.visibleMonth.getFullYear();
      const month = state.visibleMonth.getMonth();
      const first = new Date(year, month, 1);
      const start = addDays(first, -first.getDay());
      els.calendarTitle.textContent = `${year}年${month + 1}月`;
      els.calendarDays.innerHTML = "";

      for (let i = 0; i < 42; i += 1) {
        const date = addDays(start, i);
        const key = toKey(date);
        const count = state.reservations.filter((item) => item.date === key).length;
        const button = document.createElement("button");
        button.type = "button";
        button.className = "day";
        button.disabled = date < today || date > maxDate;
        button.setAttribute("aria-label", `${formatLong(date)} ${count}件`);
        if (key === state.selectedDate) button.classList.add("selected");
        if (key === toKey(today)) button.classList.add("today");
        if (date.getMonth() !== month) button.style.visibility = "hidden";
        button.innerHTML = `<span class="num">${date.getDate()}</span>${count ? `<span class="badge">${count}</span>` : "<span></span>"}`;
        button.addEventListener("click", () => {
          state.selectedDate = key;
          render();
        });
        els.calendarDays.appendChild(button);
      }

      const prevMonthEnd = new Date(year, month, 0);
      const nextMonthStart = new Date(year, month + 1, 1);
      els.prevMonth.disabled = prevMonthEnd < today;
      els.nextMonth.disabled = nextMonthStart > maxDate;
    }

    function renderList() {
      const selected = fromKey(state.selectedDate);
      els.selectedDateLabel.textContent = formatLong(selected);
      const items = getDayReservations(state.selectedDate);
      els.appointmentList.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "この日の予約はまだありません。下のフォームから追加できます。";
        els.appointmentList.appendChild(empty);
        return;
      }

      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "appointment";
        row.innerHTML = `
          <div class="time">${item.time}</div>
          <div class="who">
            <b>${escapeHtml(item.name)}</b>
            <span>${escapeHtml(item.service)}${item.memo ? ` / ${escapeHtml(item.memo)}` : ""}</span>
          </div>
          <button class="danger-btn" type="button">取消</button>
        `;
        row.querySelector("button").addEventListener("click", () => {
          if (!window.confirm(`${item.time} ${item.name} の予約を取消しますか？`)) return;
          state.reservations = state.reservations.filter((reservation) => reservation.id !== item.id);
          saveReservations();
          render();
          showToast("予約を取消しました");
        });
        els.appointmentList.appendChild(row);
      });
    }

    function renderStats() {
      const inRange = state.reservations.filter((item) => {
        const date = fromKey(item.date);
        return date >= today && date <= maxDate;
      });
      els.todayCount.textContent = getDayReservations(toKey(today)).length;
      els.selectedCount.textContent = getDayReservations(state.selectedDate).length;
      els.monthCount.textContent = inRange.length;
    }

    function getDayReservations(key) {
      return state.reservations
        .filter((item) => item.date === key)
        .sort((a, b) => a.time.localeCompare(b.time));
    }

    function loadReservations() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) return parsed;
        } catch (error) {
          console.warn("予約データを読み込めませんでした", error);
        }
      }

      return [
        {
          id: "sample-1",
          date: toKey(today),
          time: "09:30",
          name: "佐藤さん",
          service: "カット",
          memo: "電話予約",
          createdAt: new Date().toISOString()
        },
        {
          id: "sample-2",
          date: toKey(today),
          time: "13:00",
          name: "鈴木さん",
          service: "カット＋カラー",
          memo: "LINEから",
          createdAt: new Date().toISOString()
        },
        {
          id: "sample-3",
          date: toKey(addDays(today, 2)),
          time: "10:00",
          name: "田中さん",
          service: "カラー",
          memo: "",
          createdAt: new Date().toISOString()
        }
      ];
    }

    function saveReservations() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.reservations));
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function stripTime(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return stripTime(next);
    }

    function addMonths(date, months) {
      const next = new Date(date);
      next.setMonth(next.getMonth() + months);
      return stripTime(next);
    }

    function toKey(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function fromKey(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatShort(date) {
      return `${date.getMonth() + 1}/${date.getDate()} ${["日", "月", "火", "水", "木", "金", "土"][date.getDay()]}`;
    }

    function formatLong(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日（${["日", "月", "火", "水", "木", "金", "土"][date.getDay()]}）`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
